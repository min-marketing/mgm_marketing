<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메일/문자 발송 신청</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #EEF3FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* 헤더 배너 */
    .page-header {
      width: 100%;
      max-width: 560px;
      background: #2B5BF0;
      border-radius: 16px 16px 0 0;
      padding: 32px 36px 28px;
      color: #fff;
    }

    .page-header .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9FB8FF;
      margin-bottom: 8px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
    }

    .page-header p {
      margin-top: 6px;
      font-size: 13px;
      color: #BAD0FF;
    }

    /* 카드 */
    .card {
      background: #fff;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 8px 32px rgba(43, 91, 240, 0.10);
      padding: 36px 36px 40px;
      width: 100%;
      max-width: 560px;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #EEF1F8;
      margin: 28px 0;
    }

    /* 섹션 타이틀 */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #2B5BF0;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* 필드 */
    .field { margin-bottom: 20px; }

    .field:last-of-type { margin-bottom: 0; }

    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1A1F36;
      margin-bottom: 7px;
    }

    label.field-label .req { color: #2B5BF0; margin-left: 2px; }

    /* 인풋 */
    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #DDE2F0;
      border-radius: 9px;
      font-size: 14px;
      color: #1A1F36;
      background: #FAFBFF;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="tel"]:focus {
      border-color: #2B5BF0;
      box-shadow: 0 0 0 3px rgba(43,91,240,0.10);
      background: #fff;
    }

    /* 두 컬럼 그리드 */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .field-row .field { margin-bottom: 0; }

    /* 채널 선택 */
    .channel-group {
      display: flex;
      gap: 10px;
    }

    .channel-item {
      flex: 1;
      position: relative;
      cursor: pointer;
    }

    .channel-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .channel-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 10px;
      border: 1.5px solid #DDE2F0;
      border-radius: 10px;
      background: #FAFBFF;
      transition: all 0.15s;
      text-align: center;
    }

    .channel-item input:checked ~ .channel-box {
      border-color: #2B5BF0;
      background: #EEF3FF;
    }

    .channel-box .icon { font-size: 22px; }

    .channel-box .name {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .channel-item input:checked ~ .channel-box .name {
      color: #2B5BF0;
    }

    .channel-box .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid #CBD0E0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .channel-item input:checked ~ .channel-box .check {
      background: #2B5BF0;
      border-color: #2B5BF0;
    }

    .channel-box .check::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      display: none;
    }

    .channel-item input:checked ~ .channel-box .check::after { display: block; }

    /* 업로드 */
    .upload-area {
      border: 1.5px dashed #CBD0E0;
      border-radius: 10px;
      padding: 26px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: #FAFBFF;
      transition: all 0.18s;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: #2B5BF0;
      background: #EEF3FF;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 44px;
      height: 44px;
      background: #EEF3FF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 20px;
    }

    .upload-text {
      font-size: 13px;
      color: #555;
    }

    .upload-text strong { color: #2B5BF0; }

    .upload-hint {
      font-size: 11px;
      color: #AAB0C4;
      margin-top: 4px;
    }

    /* 파일 선택됨 */
    .file-selected {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding: 10px 14px;
      background: #EEF3FF;
      border-radius: 8px;
      font-size: 13px;
      color: #2B5BF0;
      border: 1px solid #C5D4FF;
    }

    .file-selected .file-name {
      flex: 1;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-selected .remove-file {
      cursor: pointer;
      color: #AAB0C4;
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
    }

    .file-selected .remove-file:hover { color: #e74c3c; }

    .template-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 9px;
      font-size: 12px;
      color: #2B5BF0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
    }

    .template-btn:hover { text-decoration: underline; }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #2B5BF0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover { background: #1A45D4; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #9FB8FF; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 메시지 */
    .result {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }

    .result.success {
      background: #E8F8F0;
      color: #1A8A50;
      border: 1px solid #A8E0C4;
    }

    .result.error {
      background: #FEF0F0;
      color: #D63B3B;
      border: 1px solid #F5B7B1;
    }

    /* textarea */
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #DDE2F0;
      border-radius: 9px;
      font-size: 14px;
      color: #1A1F36;
      background: #FAFBFF;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
      resize: vertical;
      min-height: 110px;
      font-family: inherit;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: #2B5BF0;
      box-shadow: 0 0 0 3px rgba(43,91,240,0.10);
      background: #fff;
    }

    .field-desc {
      font-size: 12px;
      color: #8A93B0;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    /* 채널 오류 */
    .channel-error {
      display: none;
      font-size: 12px;
      color: #D63B3B;
      margin-top: 8px;
    }

    /* 유효성 오류 표시 */
    input.invalid { border-color: #E74C3C !important; }
    textarea.invalid { border-color: #E74C3C !important; }

    @media (max-width: 480px) {
      .page-header, .card { border-radius: 12px; }
      .page-header { border-radius: 12px 12px 0 0; padding: 24px 20px 20px; }
      .card { padding: 24px 20px 28px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="label">EM 발송 요청 시스템</div>
    <h1>메일 / 문자 발송 신청</h1>
    <p>아래 항목을 모두 입력하신 후 신청해 주세요.</p>
  </div>

  <div class="card">
    <form id="requestForm" novalidate>

      <!-- 담당자 정보 -->
      <div class="section-title">담당자 정보</div>

      <div class="field-row">
        <div class="field">
          <label class="field-label">EM 담당자명 <span class="req">*</span></label>
          <input type="text" id="managerName" placeholder="이름 입력" />
        </div>
        <div class="field">
          <label class="field-label">EM 연락처 <span class="req">*</span></label>
          <input type="tel" id="managerContact" placeholder="010-0000-0000" />
        </div>
      </div>

      <hr class="divider" />

      <!-- 발송 채널 -->
      <div class="section-title">발송 채널</div>

      <div class="field" style="margin-bottom:0;">
        <label class="field-label" style="margin-bottom:12px;">채널 선택 <span class="req">*</span> <span style="font-weight:400;color:#AAB0C4;">(중복 선택 가능)</span></label>
        <div class="channel-group">
          <label class="channel-item">
            <input type="checkbox" name="channel" value="메일" />
            <div class="channel-box">
              <div class="icon">✉️</div>
              <div class="name">메일</div>
              <div class="check"></div>
            </div>
          </label>
          <label class="channel-item">
            <input type="checkbox" name="channel" value="문자" />
            <div class="channel-box">
              <div class="icon">💬</div>
              <div class="name">문자</div>
              <div class="check"></div>
            </div>
          </label>
        </div>
        <div class="channel-error" id="channelError">메일 또는 문자를 1개 이상 선택해 주세요.</div>
      </div>

      <hr class="divider" />

      <!-- 원하는 문구 -->
      <div class="section-title">원하는 문구</div>

      <div class="field" style="margin-bottom:0;">
        <label class="field-label">추가 문구 <span class="req">*</span></label>
        <p class="field-desc">메일 또는 문자를 지정하여 추가하고 싶으신 문구를 적어주세요.</p>
        <textarea id="customMessage" placeholder="예) 메일: 안녕하세요, OO팀 홍길동입니다. 이번 이벤트를 안내드립니다.&#10;문자: [OO] 특별 혜택 안내 드립니다."></textarea>
      </div>

      <hr class="divider" />

      <!-- 고객 리스트 -->
      <div class="section-title">고객 리스트</div>

      <div class="field" style="margin-bottom:0;">
        <label class="field-label">엑셀 파일 업로드 <span class="req">*</span></label>
        <p class="field-desc">엑셀 양식을 다운로드 받아 회사명, 휴대폰번호, 이메일을 추가하여 업로드해 주세요.</p>

        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept=".xlsx,.xls" />
          <div class="upload-icon">📂</div>
          <div class="upload-text"><strong>파일 선택</strong> 또는 여기에 드래그</div>
          <div class="upload-hint">.xlsx / .xls 파일만 가능</div>
        </div>

        <div class="file-selected" id="fileSelected">
          <span>📄</span>
          <span class="file-name" id="fileName"></span>
          <span class="remove-file" id="removeFile" title="제거">✕</span>
        </div>

        <button type="button" class="template-btn" id="downloadTemplate">
          ⬇ 엑셀 양식 다운로드
        </button>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span id="btnText">신청하기</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <div class="result" id="result"></div>
  </div>

  <div style="text-align:center; margin-top:16px;">
    <a href="my-requests.html" style="font-size:13px; color:#2B5BF0; text-decoration:none; font-weight:500;">
      📋 내 신청 내역 조회 · 삭제
    </a>
  </div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPt8U2kFqw-C9Du2Ycb9KoL60emS2CJ8ujoSg26khfPTGJe4ubHMpiZv5ftLiDCn08hA/exec';

  const fileInput     = document.getElementById('fileInput');
  const fileSelected  = document.getElementById('fileSelected');
  const fileNameEl    = document.getElementById('fileName');
  const removeFileBtn = document.getElementById('removeFile');
  const uploadArea    = document.getElementById('uploadArea');

  let selectedFile = null;

  // 채널 선택 시 오류 메시지 숨김
  document.querySelectorAll('input[name="channel"]').forEach(cb => {
    cb.addEventListener('change', () => {
      document.getElementById('channelError').style.display = 'none';
    });
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('drag-over');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) setFile(f);
  });

  function setFile(f) {
    selectedFile = f;
    fileNameEl.textContent = f.name;
    fileSelected.style.display = 'flex';
  }

  removeFileBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileSelected.style.display = 'none';
  });

  document.getElementById('downloadTemplate').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = 'template.xlsx';
    a.download = '고객리스트_양식.xlsx';
    a.click();
  });

  document.getElementById('requestForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const managerName    = document.getElementById('managerName').value.trim();
    const managerContact = document.getElementById('managerContact').value.trim();
    const customMessage  = document.getElementById('customMessage').value.trim();
    const channels       = [...document.querySelectorAll('input[name="channel"]:checked')].map(c => c.value);
    const channelError   = document.getElementById('channelError');

    // 유효성 검사
    if (!managerName)    return showResult('error', 'EM 담당자명을 입력해 주세요.');
    if (!managerContact) return showResult('error', 'EM 연락처를 입력해 주세요.');
    if (channels.length === 0) {
      channelError.style.display = 'block';
      return showResult('error', '발송 채널을 1개 이상 선택해 주세요.');
    }
    channelError.style.display = 'none';
    if (!customMessage)  return showResult('error', '원하는 문구를 입력해 주세요.');
    if (!selectedFile)   return showResult('error', '고객 리스트 파일을 업로드해 주세요.');

    setLoading(true);

    try {
      const formData = new FormData();
      formData.append('managerName',    managerName);
      formData.append('managerContact', managerContact);
      formData.append('channels',       channels.join(', '));
      formData.append('customMessage',  customMessage);
      formData.append('file',           selectedFile, selectedFile.name);

      const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
      const data = await res.json();

      if (data.status === 'success') {
        showResult('success', `✅ 신청 완료! ${data.count}건의 고객 데이터가 접수되었습니다.`);
        document.getElementById('requestForm').reset();
        selectedFile = null;
        fileSelected.style.display = 'none';
      } else {
        showResult('error', '오류: ' + (data.message || '다시 시도해 주세요.'));
      }
    } catch {
      showResult('error', '서버 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.');
    } finally {
      setLoading(false);
    }
  });

  function setLoading(on) {
    const btn  = document.getElementById('submitBtn');
    const txt  = document.getElementById('btnText');
    const spin = document.getElementById('spinner');
    btn.disabled       = on;
    txt.style.display  = on ? 'none' : 'inline';
    spin.style.display = on ? 'block' : 'none';
  }

  function showResult(type, msg) {
    const el = document.getElementById('result');
    el.className      = 'result ' + type;
    el.textContent    = msg;
    el.style.display  = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>

</body>
</html>
